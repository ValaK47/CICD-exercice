name: CD - Déploiement Continu

# Ce pipeline ne se déclenche que sur la branche main (après merge d'une PR)
on:
  push:
    branches: [ main ]

# Permissions minimales (principe du moindre privilège)
permissions:
  contents: read
  packages: write  # Pour publier sur GitHub Container Registry

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 : Publier l'image sur GitHub Container Registry
  # ─────────────────────────────────────────────
  publish:
    name: Publication image Docker (GHCR)
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code source
        uses: actions/checkout@v4

      - name: Se connecter à GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          # GITHUB_TOKEN est injecté automatiquement — jamais stocker de token dans le code !
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurer Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extraire les métadonnées Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Construire et publier l'image
        uses: docker/build-push-action@v5
        with:
          context: app
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # JOB 2 : Déploiement en environnement Staging
  # ─────────────────────────────────────────────
  deploy-staging:
    name: Déploiement Staging
    runs-on: ubuntu-latest
    needs: publish
    environment:
      name: staging
      url: https://staging.mon-app.example.com  # À remplacer

    steps:
      - name: Déployer en staging
        run: |
          echo "Déploiement de l'image ghcr.io/${{ github.repository }}:sha-${{ github.sha }}"
          echo "En production réelle, ici on lancerait une commande SSH, kubectl, ou appel API"
          # Exemple SSH :
          # ssh user@staging-server "docker pull ghcr.io/${{ github.repository }}:latest && docker-compose up -d"

      - name: Tests de fumée (smoke tests)
        run: |
          echo "Vérification que l'application répond..."
          # curl --fail https://staging.mon-app.example.com/health

  # ─────────────────────────────────────────────
  # JOB 3 : Déploiement en Production (avec approbation manuelle)
  # ─────────────────────────────────────────────
  deploy-production:
    name: Déploiement Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    # L'environment "production" peut être configuré pour exiger une approbation manuelle
    environment:
      name: production
      url: https://mon-app.example.com  # À remplacer

    steps:
      - name: Déployer en production
        run: |
          echo "Déploiement validé en production !"
          echo "Image : ghcr.io/${{ github.repository }}:sha-${{ github.sha }}"

      - name: Notifier l'équipe
        run: |
          echo "En production réelle, on enverrait une notification Slack/Teams ici"
          # Exemple avec un webhook Slack stocké en secret :
          # curl -X POST -H 'Content-type: application/json' \
          #   --data '{"text":"Déploiement réussi en production !"}' \
          #   ${{ secrets.SLACK_WEBHOOK_URL }}
